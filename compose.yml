# AL Dev Toolbox stack. Two services: Postgres (`db`) and the app
# (`aldevtoolbox`). Three named volumes — see the `volumes` block at the
# bottom for the layout reference.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aldevtoolbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aldevtoolbox}
      POSTGRES_DB: ${POSTGRES_DB:-aldevtoolbox}
    volumes:
      # postgres:18+ places data under /var/lib/postgresql/<major>/docker/ so
      # in-place pg_upgrade works inside one mount. Mount the parent rather
      # than .../data — the older path makes the entrypoint refuse to start.
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aldevtoolbox} -d ${POSTGRES_DB:-aldevtoolbox}"]
      interval: 10s
      timeout: 5s
      retries: 6
      # First-boot postgres-alpine spends ~10-15s initialising on a fresh
      # volume (initdb + role/db creation). A short start_period made
      # `depends_on: service_healthy` time out on slower CI runners.
      start_period: 30s
    restart: unless-stopped
    # Resource ceilings (M21). Postgres scales linearly with shared_buffers
    # and work_mem; both default to sane values for ~1 GiB. Operators with
    # bigger boxes should raise the limit *and* tune postgresql.conf —
    # raising the cgroup alone leaves the defaults on the table.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        reservations:
          memory: 256m

  aldevtoolbox:
    # Official images are published to GHCR on every release tag — see
    # CLAUDE.md "Releases and image publishing". Moving tags `latest`, `6`
    # (major) and `6.0` (minor) plus the exact `6.0.0` are all pushed; pin as
    # loosely or tightly as you like via ALDEVTOOLBOX_TAG. To build from source
    # instead, comment out `image:` and uncomment `build: .`.
    image: ghcr.io/mtaanquist/aldevtoolbox:${ALDEVTOOLBOX_TAG:-latest}
    # build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # Compose builds the connection string from the POSTGRES_* knobs so the
      # operator only manages credentials in one place. The `db` host name is
      # the compose service name above.
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-aldevtoolbox};Username=${POSTGRES_USER:-aldevtoolbox};Password=${POSTGRES_PASSWORD:-aldevtoolbox}"
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      # Single-tenant mode. Set to 1 when one organisation runs the toolbox
      # internally: hides and disables the multi-tenant surfaces (storage
      # quotas, per-tenant snapshots, and self-service org creation at signup).
      # System-level pg_dump backups stay on. Leave blank/0 for the default
      # multi-tenant behaviour. One-way: you can't move a single-tenant install
      # to multi-tenant in place — start fresh. See .design/deployment.md.
      SINGLE_TENANT_MODE: ${SINGLE_TENANT_MODE:-0}
      # First-run seeding for single-tenant mode (only applied to a fresh
      # database, alongside the bootstrap admin). Names the lone organisation
      # and claims its email domain(s) so staff can sign up via domain routing
      # without an admin pre-claiming the domain. Domains: comma/space
      # separated; verified (SMTP) signups from them auto-join as active users.
      SINGLE_TENANT_ORG_NAME: ${SINGLE_TENANT_ORG_NAME:-}
      SINGLE_TENANT_ORG_SLUG: ${SINGLE_TENANT_ORG_SLUG:-}
      SINGLE_TENANT_EMAIL_DOMAINS: ${SINGLE_TENANT_EMAIL_DOMAINS:-}
      # Data Protection key ring (M17). Persists cookie auth keys and the
      # SMTP-password ciphertext key across container restarts. Override
      # via DATA_PROTECTION_KEY_DIR if your volume layout differs.
      DATA_PROTECTION_KEY_DIR: /var/lib/aldevtoolbox/dp-keys
      # M18: BackupService writes pg_dump files here. Override via BACKUPS_DIR
      # if your volume layout differs; the app-backups named volume is the
      # only place backups live in the supported deployment shape.
      BACKUPS_DIR: /var/lib/aldevtoolbox/backups
      # The customer-build pipeline provisions the AL compiler (alc) at runtime
      # into this directory from NuGet, so a new compiler version never needs an
      # image rebuild. Backed by the app-altool named volume. Override via
      # AL_COMPILER_DIR; pin a version with AL_COMPILER_VERSION; or point
      # AL_COMPILER_PATH at a pre-seeded alc for air-gapped installs.
      AL_COMPILER_DIR: /var/lib/aldevtoolbox/altool
      # WebAuthn / passkeys. RpId must be a registrable suffix of the
      # hostname the browser sees (e.g. `aldevtoolbox.example.com`); leave
      # blank to disable the passkey UI. OriginsCsv is a comma-separated
      # list of full `https://…` origins the app will accept assertions
      # from — pass at least the public hostname; add more if you have
      # multiple entry points (admin subdomain, staging, etc).
      Auth__WebAuthn__RpId: ${AUTH_WEBAUTHN_RP_ID:-}
      Auth__WebAuthn__OriginsCsv: ${AUTH_WEBAUTHN_ORIGINS:-}
      # --- Optional operational knobs (uncomment as needed) ----------------
      # Background scheduler opt-outs. Set to 1 to stop the respective timer —
      # handy for read-only replicas or when an external cron owns backups.
      # DISABLE_BACKUP_SCHEDULER: "1"           # daily pg_dump + per-tenant snapshots
      # DISABLE_OE_VACUUM_SCHEDULER: "1"        # nightly VACUUM over Object Explorer tables
      # DISABLE_USAGE_SNAPSHOT_SCHEDULER: "1"   # 15-min storage-usage snapshots (StorageBar)
      #
      # SMTP bootstrap. SMTP is normally configured in the SiteAdmin UI
      # (/site-admin/settings/smtp, stored encrypted); these env vars are the
      # fallback used before that's set. The password is read from a file so
      # it never lands in the process environment — mount it as a secret.
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: "587"
      # SMTP_USER: apikey
      # SMTP_FROM: "AL Dev Toolbox <noreply@example.com>"
      # SMTP_USE_STARTTLS: "true"
      # SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      #
      # Postgres client binaries for backup/restore. Override only if pg_dump /
      # pg_restore aren't on PATH or you need a specific version.
      # PG_DUMP_PATH: /usr/bin/pg_dump
      # PG_RESTORE_PATH: /usr/bin/pg_restore
      #
      # OAuth signing-key directory. Defaults to DATA_PROTECTION_KEY_DIR, then
      # /var/lib/aldevtoolbox/dp-keys. Set only if you keep OAuth keys apart.
      # OAUTH_KEY_DIR: /var/lib/aldevtoolbox/oauth-keys
    volumes:
      - app-keys:/var/lib/aldevtoolbox/dp-keys
      - app-backups:/var/lib/aldevtoolbox/backups
      - app-altool:/var/lib/aldevtoolbox/altool
    # The Dockerfile already declares a HEALTHCHECK against /healthz. Compose
    # picks it up automatically; we don't restate it here to avoid the two
    # drifting.
    restart: unless-stopped
    # Resource ceilings. The memory limit is sized for Object Explorer
    # ingestion: parsing Microsoft's Base Application .app peaks around
    # 2-3 GiB of managed heap (full .app buffered, SymbolReference.json
    # tree, embedded src/ tree, plus the second byte[] copy R2R-wrapped
    # modules need during the recursive unwrap). 1 GiB OOM'd on BC 28.1.1;
    # 4 GiB lands comfortably and leaves headroom for future Base App
    # growth. CPU is bumped to 4 so server GC has more workers during
    # those big parses — ingestion itself is sequential, but GC throughput
    # at this heap size benefits from the extra cores.
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
        reservations:
          memory: 256m

  # --- Optional HTTPS reverse proxy (Caddy) ----------------------------------
  # Uncomment this service to terminate TLS with automatic Let's Encrypt certs.
  # The app itself stays HTTP-only on 8080; Caddy fronts it on 80/443. One-time
  # setup:
  #   1. Point a DNS A/AAAA record at this host and open ports 80 + 443.
  #   2. Set SITE_ADDRESS (your domain) and ACME_EMAIL in .env.
  #   3. Uncomment this service AND the caddy-data / caddy-config volumes below.
  #   4. (recommended) remove the aldevtoolbox `ports:` mapping above so the app
  #      is reachable only through the proxy.
  #   5. (passkeys) set AUTH_WEBAUTHN_RP_ID + AUTH_WEBAUTHN_ORIGINS to the domain.
  # Email links (verify/reset/invite) automatically use https://<domain> because
  # Caddy preserves the inbound Host header and the app honours X-Forwarded-Proto
  # (UseForwardedHeaders) — reach the app through the domain, not the raw :8080.
  # The Caddyfile at the repo root carries the proxy config.
  # caddy:
  #   image: caddy:2-alpine
  #   depends_on:
  #     - aldevtoolbox
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "443:443/udp"   # HTTP/3
  #   environment:
  #     SITE_ADDRESS: ${SITE_ADDRESS:?set your domain, e.g. aldevtoolbox.example.com}
  #     ACME_EMAIL: ${ACME_EMAIL:?set a Let's Encrypt contact email, e.g. ops@example.com}
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data      # ACME account + issued certs — persist to avoid LE rate limits
  #     - caddy-config:/config
  #   restart: unless-stopped

# Volume layout (M21).
# - pg-data:     Postgres data files. The only thing that needs a real backup
#                if you're not relying on app-backups.
# - app-keys:    ASP.NET Data Protection key ring. Loss invalidates all login
#                cookies and decrypts of stored SMTP passwords.
# - app-backups: pg_dump output written by BackupService (M18). Pinned files
#                survive retention sweeps; everything else rolls off.
# - app-altool:  AL compiler (alc) provisioned at runtime by the customer-build
#                pipeline. Disposable — re-provisioned from NuGet if lost.
volumes:
  pg-data:
  app-keys:
  app-backups:
  app-altool:
  # Uncomment alongside the optional `caddy` service above.
  # caddy-data:     # Caddy ACME account + issued certificates (persist!)
  # caddy-config:   # Caddy autosave config
