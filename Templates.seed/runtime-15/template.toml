# Runtime 15+ template — namespace folder layout
# Used by Business Central v24 and later, where AL got first-class
# namespace support and the recommended folder layout shifted from
# src/<element-type>/ to Source/<namespace>/.

[template]
key = "runtime-15"
runtime = 15
name = "Runtime 15+"
description = "Namespace folders (BC v24+)"
default_application = "24.0.0.0"
default_platform = "1.0.0.0"
core_id_range_from = 90000
core_id_range_to = 90999
module_id_range_start = 91000
module_id_range_size = 200

[defaults]
publisher = "Consortio IT"
target = "Cloud"
url = "https://www.consortio.dk/"
logo = "../.assets/images/logo.png"
features = ["TranslationFile", "NoImplicitWith"]
supportedLocales = ["en-US", "da-DK"]

[defaults.resourceExposurePolicy]
allowDebugging = true
allowDownloadingSource = false
includeSourceInSymbolFile = true

[appSourceCop]
mandatoryPrefix = "CONIT"
supportedCountries = ["US", "DK"]

# Folder structure modelled on the Core extension layout the team is moving to.
# Each [[folders.files]] block seeds one file into the parent folder; the
# generator runs mustache substitution on .al files at generation time.

[[folders]]
path = "Source/Foundation"

[[folders.files]]
path = "AppInstall.Codeunit.al"
content = """
namespace {{namespace}};

/// <summary>
/// Runs once when the {{name}} extension is installed in a tenant. Hook
/// post-install setup here (defaults, telemetry signups, etc.).
/// </summary>
codeunit 90100 "{{prefix}} App Install"
{
    Subtype = Install;

    trigger OnInstallAppPerCompany()
    begin
        // First-install logic for {{moduleName}} goes here.
    end;
}
"""

[[folders.files]]
path = "AppUpgrade.Codeunit.al"
content = """
namespace {{namespace}};

/// <summary>
/// Runs on upgrade of the {{name}} extension. Use upgrade tags to make each
/// migration step idempotent — see <c>{{prefix}} App Upgrade Tag Definitions</c>.
/// </summary>
codeunit 90101 "{{prefix}} App Upgrade"
{
    Subtype = Upgrade;

    trigger OnUpgradePerCompany()
    begin
        // Per-company upgrade logic for {{moduleName}} goes here.
    end;
}
"""

[[folders]]
path = "Source/Finance"

[[folders.files]]
path = "AppSetup.Table.al"
content = """
namespace {{namespace}};

/// <summary>
/// Singleton setup table for the {{moduleName}} module. Keep configuration
/// flags here so they can be edited from <c>{{prefix}} App Setup</c>.
/// </summary>
table 90110 "{{prefix}} App Setup"
{
    Caption = '{{name}} Setup';
    DataClassification = CustomerContent;

    fields
    {
        field(1; "Primary Key"; Code[10])
        {
            Caption = 'Primary Key';
            DataClassification = SystemMetadata;
        }
        field(10; "Enabled"; Boolean)
        {
            Caption = 'Enabled';
            DataClassification = CustomerContent;
        }
    }

    keys
    {
        key(PK; "Primary Key") { Clustered = true; }
    }
}
"""

[[folders]]
path = "Source/Sales"

[[folders]]
path = "Source/Purchases"

[[folders]]
path = "Source/Inventory"

[[folders]]
path = "Source/Warehouse"

[[folders]]
path = "Source/Projects"

[[folders]]
path = "Source/Security"

[[folders.files]]
path = "AppAdmins.PermissionSet.al"
content = """
namespace {{namespace}};

/// <summary>
/// Admin-level permissions for the {{name}} extension. Grants full access to
/// every object the extension introduces; assign to power users only.
/// </summary>
permissionset 90120 "{{prefix}} App Admins"
{
    Assignable = true;
    Caption = '{{name}} Admins';
    Permissions =
        tabledata "{{prefix}} App Setup" = RIMD;
}
"""

[[folders.files]]
path = "AppAllUsers.PermissionSet.al"
content = """
namespace {{namespace}};

/// <summary>
/// Read-only permission set for the {{name}} extension. Default for everyday
/// users; pair it with <c>{{prefix}} App Admins</c> for elevated access.
/// </summary>
permissionset 90121 "{{prefix}} App All Users"
{
    Assignable = true;
    Caption = '{{name}} All Users';
    Permissions =
        tabledata "{{prefix}} App Setup" = R;
}
"""

[[folders]]
path = "Translations"
