# Runtime 13 template — element-type folder layout
# The layout the existing static tool generates today: src/<element-type>/
# subdirectories like codeunits, pages, tables, etc. Pre-namespace AL.

[template]
key = "runtime-13"
runtime = 13
name = "Runtime 13"
description = "src/* layout (BC v22)"
default_application = "22.0.0.0"
default_platform = "1.0.0.0"
default_application_version = "bc-v22"
core_id_range_from = 90000
core_id_range_to = 90999
module_id_range_start = 91000
module_id_range_size = 200

[defaults]
publisher = "Example Publisher"
target = "Cloud"
url = "https://example.com/"
logo = "../.assets/images/logo.png"
features = ["TranslationFile", "NoImplicitWith"]
supportedLocales = ["en-US"]

[defaults.resourceExposurePolicy]
allowDebugging = true
allowDownloadingSource = false
includeSourceInSymbolFile = true

[appSourceCop]
mandatoryPrefix = "EXMPL"
supportedCountries = ["US"]

# Element-type folders, matching the existing static tool's output.
# Note: reportextensions and reports also need a layouts/ subfolder. The
# generator handles this special case by convention rather than encoding it
# in the template — see generation-engine.md.

[[folders]]
path = "src/api"

[[folders]]
path = "src/codeunits"

[[folders]]
path = "src/controls"

[[folders]]
path = "src/enumextensions"

[[folders]]
path = "src/enums"

[[folders]]
path = "src/pageextensions"

[[folders]]
path = "src/pages"

[[folders]]
path = "src/profiles"

[[folders]]
path = "src/queries"

[[folders]]
path = "src/reportextensions"

[[folders]]
path = "src/reports"

[[folders]]
path = "src/tableextensions"

[[folders]]
path = "src/tables"

[[folders]]
path = "src/xmlports"

[[folders]]
path = "translations"
