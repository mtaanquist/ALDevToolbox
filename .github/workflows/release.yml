name: release

# Cuts a versioned GHCR image whenever a vX.Y.Z tag is pushed. The build job in
# build.yml already gates "compiles + tests + compose-smoke" on every push
# (tags included), so this workflow stays focused on building and publishing the
# image — tag a commit that's already green on main. Version scheme and the
# how-to-cut-a-release steps live in CLAUDE.md under "Releases and image
# publishing".
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  # contents: write so the run can publish the GitHub Release for the tag
  # (see the "Publish GitHub Release" step); packages: write to push the image;
  # actions: read so the release gate can query build.yml's run for this commit.
  contents: write
  packages: write
  actions: read

env:
  # The docker/* and actions/checkout actions still ship on Node 20, which
  # GitHub forces to Node 24 on 2026-06-16. Opt in early so the cutover is a
  # non-event; drop this once those actions default to Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate: don't publish a commit that hasn't passed CI. build.yml runs on the
  # tag push too (push event), so wait for its run on this exact SHA to conclude
  # success before building/publishing the image. See issue #392.
  require-green-build:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build.yml to pass for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha='${{ github.sha }}'
          repo='${{ github.repository }}'
          for attempt in $(seq 1 90); do
            runs=$(gh api "repos/${repo}/actions/workflows/build.yml/runs?head_sha=${sha}&per_page=30" \
              --jq '.workflow_runs[] | "\(.status) \(.conclusion)"' || true)
            if echo "$runs" | grep -q '^completed success$'; then
              echo "build.yml is green for ${sha}."
              exit 0
            fi
            if echo "$runs" | grep -Eq '^completed (failure|cancelled|timed_out)$'; then
              echo "build.yml did not pass for ${sha}; refusing to release." >&2
              echo "$runs" >&2
              exit 1
            fi
            echo "Waiting for build.yml on ${sha} (attempt ${attempt})…"
            sleep 20
          done
          echo "Timed out waiting for build.yml to finish for ${sha}." >&2
          exit 1

  image:
    needs: require-green-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives the tag set from the git tag. v6.0.0 -> 6.0.0, 6.0, 6, latest.
      # The moving major/minor/latest tags let operators pin as loosely or
      # tightly as they like; metadata-action lowercases the image name so the
      # repo's casing doesn't matter to GHCR.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=AL Dev Toolbox
            org.opencontainers.image.description=Blazor Server tool for generating AL/BC workspaces and standalone extensions

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Publish the GitHub Release for the tag, with GitHub's auto-generated
      # "What's Changed" notes. Runs last so a failed image build never
      # announces a release. The tag is taken from github.ref; creating the
      # Release with GITHUB_TOKEN doesn't re-trigger this workflow (or build.yml),
      # so there's no loop. Before this step releases were image-only and the
      # GitHub Release had to be cut by hand — see CLAUDE.md "Releases and image
      # publishing".
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
