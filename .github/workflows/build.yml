name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Service container for the test suite. TestDb reads
      # ALDT_TEST_POSTGRES_CONNECTION when set and skips spinning up its own
      # Testcontainers container — faster than booting Docker-inside-Docker on
      # a runner that already provides Postgres.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ALDT_TEST_POSTGRES_CONNECTION: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  compose-smoke:
    # Boots the published image against a real `db` container to lock in the
    # M16 done-when criterion: `docker compose up` brings up Postgres + app
    # cleanly against an empty volume. Catches Dockerfile / compose / startup
    # regressions the dotnet-test job can't see (those run against a service
    # container, not the published app image).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        env:
          # Random password each run so a leak in workflow logs isn't reusable.
          POSTGRES_PASSWORD: ci-${{ github.run_id }}
          BOOTSTRAP_ADMIN_EMAIL: admin@example.com
          BOOTSTRAP_ADMIN_PASSWORD: ci-bootstrap-${{ github.run_id }}
        # --wait blocks until every container reports healthy or the timeout
        # expires; without it, compose only waits ~30s on depends_on before
        # giving up. The 180s budget covers postgres init + image build.
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Dump container logs if start-up failed
        if: failure()
        run: docker compose logs --no-color

      - name: Wait for /health/ready
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://localhost:8080/health/ready; then
              echo
              echo "App reported ready after ${attempt} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready within ~120s." >&2
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
