name: build

on:
  # The workflow always triggers; the `changes` job below decides whether the
  # heavy jobs (build/test, compose-smoke, migration-forward-compat) run. A
  # docs-only change still skips all the expensive work — but the final
  # `ci-gate` job *always* runs and reports a conclusion, so it can be the
  # single required status check on `protect-main` without deadlocking a
  # docs-only PR (the classic paths-ignore + required-check trap: a required
  # check that a paths-ignore'd workflow never reports blocks the PR forever).
  #
  # This closes the verification hole from #416: the old paths-ignore meant a
  # docs-only PR ran no workflow at all, and because no check was required, a
  # red build on a *code* PR didn't block the merge either. Make `ci-gate` the
  # required check on the branch protection rule to enforce it.
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: every job here only reads the checked-out source — it builds,
# tests, and boots a throwaway compose stack, none of which touch the repo, its
# issues, or its packages. Pin the token to read-only so the default repo token
# scope can't be misused. #415
permissions:
  contents: read

env:
  # actions/checkout and other JS actions still ship on Node 20, which GitHub
  # forces to Node 24 on 2026-06-16. Opt in early so the cutover is a
  # non-event; drop this once those actions default to Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Decides whether the change touches anything that can affect compilation,
  # tests, or the image. Docs-only diffs (**.md, .design/**, docs/**, LICENSE)
  # set code=false and the heavy jobs below skip. Uses a plain `git diff` rather
  # than a third-party filter action to avoid a new dependency (#416).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            files=$(git diff --name-only "$base" "${{ github.event.pull_request.head.sha }}")
          elif [ -n "${{ github.event.before }}" ] \
               && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          else
            # First push to a branch (or manual dispatch): no reliable base, so
            # treat it as a code change and run the full pipeline.
            files=""
          fi
          echo "Changed files:"
          echo "$files"
          if [ -z "$files" ] \
             || echo "$files" | grep -qvE '(\.md$|^\.design/|^docs/|^LICENSE$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    services:
      # Service container for the test suite. TestDb reads
      # ALDT_TEST_POSTGRES_CONNECTION when set and skips spinning up its own
      # Testcontainers container — faster than booting Docker-inside-Docker on
      # a runner that already provides Postgres.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ALDT_TEST_POSTGRES_CONNECTION: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Ubuntu 24.04 runners ship postgresql-client (currently v16) on PATH, so
      # BackupServiceTests can probe pg_dump / pg_restore without an apt step.
      # PgToolAvailability skips the tests when the major version is below 18 —
      # the dump format the postgres:18 server emits — so the suite stays
      # green on the runner image without needing the upstream pgdg repo here.

      - name: Restore
        # The committed packages.lock.json pins the explicit (wildcard) package
        # versions — the reproducibility gap #394 raised. We deliberately do NOT
        # pass --locked-mode: the Web SDK adds an implicit
        # Microsoft.AspNetCore.App.Internal.Assets reference whose version tracks
        # the SDK/runtime patch, which floats between the CI runner and the
        # Dockerfile's sdk:10.0 image — locked mode would reject every patch bump
        # (NU1004). Enforcing it would require pinning the exact SDK patch across
        # CI and the image, which is more fragile than it's worth here. See #394.
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  compose-smoke:
    # Boots the published image against a real `db` container to lock in the
    # M16 done-when criterion: `docker compose up` brings up Postgres + app
    # cleanly against an empty volume. Catches Dockerfile / compose / startup
    # regressions the dotnet-test job can't see (those run against a service
    # container, not the published app image).
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        env:
          # Random password each run so a leak in workflow logs isn't reusable.
          POSTGRES_PASSWORD: ci-${{ github.run_id }}
          BOOTSTRAP_ADMIN_EMAIL: admin@example.com
          BOOTSTRAP_ADMIN_PASSWORD: ci-bootstrap-${{ github.run_id }}
        # --wait blocks until every container reports healthy or the timeout
        # expires; without it, compose only waits ~30s on depends_on before
        # giving up. The 180s budget covers postgres init + image build.
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Dump container logs if start-up failed
        if: failure()
        run: docker compose logs --no-color

      - name: Wait for /readyz
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://localhost:8080/readyz; then
              echo
              echo "App reported ready after ${attempt} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready within ~120s." >&2
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  migration-forward-compat:
    # M18: catches accidental data-loss migrations (column drops without a
    # backfill, type changes that fail on real data). Applies the base ref's
    # migrations to a fresh Postgres, drops a sentinel row, then checks out
    # the current commit and reapplies — the sentinel must still be there.
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match the design-time factory's hardcoded database name so the
      # base-ref run (which pre-dates the env-var fallback in the factory)
      # targets the same physical database the current-branch step does.
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=aldevtoolbox_designtime"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-ef
        # Ubuntu 24.04 runners ship psql on PATH (postgresql-client-16);
        # only the EF design-time tool needs explicit installation.
        run: |
          dotnet tool install --global dotnet-ef --version 10.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Create migration database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -c "CREATE DATABASE aldevtoolbox_designtime;"

      - name: Apply base-ref migrations
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "No base ref; nothing to compare against."
            echo "BASE_HAS_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi
          git worktree add ../base-ref "$BASE_SHA"
          # The base ref may pre-date the project itself (e.g. the first PR
          # into main). With no csproj or Migrations directory there's nothing
          # to forward-compat against, so skip the base-ref apply and let the
          # current-branch step still run as a smoke test.
          if [ ! -f ../base-ref/ALDevToolbox/ALDevToolbox.csproj ] \
             || [ ! -d ../base-ref/ALDevToolbox/Data/Migrations ]; then
            echo "Base ref has no project or migrations; skipping base-ref apply."
            echo "BASE_HAS_MIGRATIONS=false" >> "$GITHUB_ENV"
            exit 0
          fi
          # Carry the current-branch design-time factory back to the base ref
          # so its `dotnet ef database update` doesn't trip the
          # PendingModelChangesWarning. The factory's behaviour at the base
          # ref is otherwise functionally identical; only the warning
          # suppression matters here, and it's been added on this branch.
          cp ALDevToolbox/Data/AppDbContextDesignTimeFactory.cs \
             ../base-ref/ALDevToolbox/Data/AppDbContextDesignTimeFactory.cs
          pushd ../base-ref >/dev/null
          dotnet restore ALDevToolbox/ALDevToolbox.csproj
          dotnet ef database update --project ALDevToolbox/ALDevToolbox.csproj
          popd >/dev/null
          echo "BASE_HAS_MIGRATIONS=true" >> "$GITHUB_ENV"

      - name: Drop sentinel row
        if: env.BASE_HAS_MIGRATIONS == 'true'
        env:
          PGPASSWORD: postgres
        # The base ref may still call the column is_seeded (renamed to
        # is_system by 20260513000000_MoveSeedToSystemOrg). Pick the column
        # name that actually exists so the sentinel inserts cleanly against
        # either schema. is_seeded/is_system is NOT NULL with no default in
        # InitialCreate, so we can't just omit it.
        run: |
          psql -h localhost -U postgres -d aldevtoolbox_designtime -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_name = 'organizations' AND column_name = 'is_system'
            ) THEN
              INSERT INTO organizations (name, slug, is_pending, is_system, created_at)
              VALUES ('Forward Compat Sentinel', 'forward-compat-sentinel', false, false, NOW());
            ELSE
              INSERT INTO organizations (name, slug, is_pending, is_seeded, created_at)
              VALUES ('Forward Compat Sentinel', 'forward-compat-sentinel', false, false, NOW());
            END IF;
          END $$;
          SQL

      - name: Apply current-branch migrations
        run: |
          dotnet restore ALDevToolbox/ALDevToolbox.csproj
          dotnet ef database update --project ALDevToolbox/ALDevToolbox.csproj

      - name: Assert sentinel survived
        if: env.BASE_HAS_MIGRATIONS == 'true'
        env:
          PGPASSWORD: postgres
        run: |
          count=$(psql -h localhost -U postgres -d aldevtoolbox_designtime -tA -c \
            "SELECT COUNT(*) FROM organizations WHERE slug = 'forward-compat-sentinel';")
          if [ "$count" != "1" ]; then
            echo "Sentinel row was lost across the migration step (count=$count)." >&2
            exit 1
          fi
          echo "Sentinel survived the migration step."

  ci-gate:
    # The single status check branch protection should require. It ALWAYS runs
    # (if: always()) — even for a docs-only PR where the heavy jobs skip — so
    # the required check always reports a conclusion instead of hanging. Passes
    # when every heavy job succeeded or was skipped; fails if any failed or was
    # cancelled. This is what makes "the build must be green" enforceable
    # without the paths-ignore deadlock. See #416.
    needs: [changes, build, compose-smoke, migration-forward-compat]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "build=${{ needs.build.result }}"
          echo "compose-smoke=${{ needs.compose-smoke.result }}"
          echo "migration-forward-compat=${{ needs.migration-forward-compat.result }}"
          for r in \
            "${{ needs.changes.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.compose-smoke.result }}" \
            "${{ needs.migration-forward-compat.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass (result: $r)." >&2
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
