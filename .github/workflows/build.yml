name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Service container for the test suite. TestDb reads
      # ALDT_TEST_POSTGRES_CONNECTION when set and skips spinning up its own
      # Testcontainers container — faster than booting Docker-inside-Docker on
      # a runner that already provides Postgres.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ALDT_TEST_POSTGRES_CONNECTION: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install postgresql-client-18
        # BackupService tests shell out to pg_dump / pg_restore against the
        # service-container Postgres (postgres:18-alpine). The major versions
        # have to match — pg_restore 16 can't replay a pg_dump 18 archive —
        # so install postgresql-client-18 from the upstream PostgreSQL repo
        # rather than the distro default.
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  compose-smoke:
    # Boots the published image against a real `db` container to lock in the
    # M16 done-when criterion: `docker compose up` brings up Postgres + app
    # cleanly against an empty volume. Catches Dockerfile / compose / startup
    # regressions the dotnet-test job can't see (those run against a service
    # container, not the published app image).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        env:
          # Random password each run so a leak in workflow logs isn't reusable.
          POSTGRES_PASSWORD: ci-${{ github.run_id }}
          BOOTSTRAP_ADMIN_EMAIL: admin@example.com
          BOOTSTRAP_ADMIN_PASSWORD: ci-bootstrap-${{ github.run_id }}
        # --wait blocks until every container reports healthy or the timeout
        # expires; without it, compose only waits ~30s on depends_on before
        # giving up. The 180s budget covers postgres init + image build.
        run: docker compose up -d --build --wait --wait-timeout 180

      - name: Dump container logs if start-up failed
        if: failure()
        run: docker compose logs --no-color

      - name: Wait for /health/ready
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://localhost:8080/health/ready; then
              echo
              echo "App reported ready after ${attempt} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready within ~120s." >&2
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  migration-forward-compat:
    # M18: catches accidental data-loss migrations (column drops without a
    # backfill, type changes that fail on real data). Applies the base ref's
    # migrations to a fresh Postgres, drops a sentinel row, then checks out
    # the current commit and reapplies — the sentinel must still be there.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=migration_check"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-ef and postgresql-client-18
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18
          dotnet tool install --global dotnet-ef --version 10.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Create migration_check database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -c "CREATE DATABASE migration_check;"

      - name: Apply base-ref migrations
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            echo "No base ref; nothing to compare against." >&2
            exit 0
          fi
          git worktree add ../base-ref "$BASE_SHA"
          pushd ../base-ref >/dev/null
          dotnet restore ALDevToolbox/ALDevToolbox.csproj
          dotnet ef database update --project ALDevToolbox/ALDevToolbox.csproj
          popd >/dev/null

      - name: Drop sentinel row
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d migration_check -c \
            "INSERT INTO organizations (name, slug, is_pending, is_seeded, created_at) VALUES ('Forward Compat Sentinel', 'forward-compat-sentinel', false, true, NOW());"

      - name: Apply current-branch migrations
        run: |
          dotnet restore ALDevToolbox/ALDevToolbox.csproj
          dotnet ef database update --project ALDevToolbox/ALDevToolbox.csproj

      - name: Assert sentinel survived
        env:
          PGPASSWORD: postgres
        run: |
          count=$(psql -h localhost -U postgres -d migration_check -tA -c \
            "SELECT COUNT(*) FROM organizations WHERE slug = 'forward-compat-sentinel';")
          if [ "$count" != "1" ]; then
            echo "Sentinel row was lost across the migration step (count=$count)." >&2
            exit 1
          fi
          echo "Sentinel survived the migration step."
